services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/nlc.db
      ALLOWED_HOSTS: '["localhost","127.0.0.1","api","testserver"]'
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/data
      - api_reports:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        INTERNAL_API_BASE_URL: http://api:8000/api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  api_data:
  api_reports:
